<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wanakachi - 视奸面板</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>

<img src="favicon.ico" alt="Logo" class="page-logo">
<a href="https://github.com/WatanabeChika/Wana_stalking" target="_blank" class="github-link" title="View Source on GitHub">
    <svg viewBox="0 0 16 16" width="22" height="22" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
    </svg>
</a>

<div class="dashboard">
    <div id="card-app" class="card">
        <div class="card-header">
            <span><span id="app-dot" class="status-dot"></span>Current Activity</span>
            <span id="time-app" class="update-time">等待数据...</span>
        </div>
        <div class="status-main">
            <div id="app-status-text" style="color: var(--text-sub);">连接中...</div>
            <div id="app-name" class="app-title">-</div>
            <div id="app-category-container" style="display: none;">
                <span id="app-category" class="app-category-badge"></span>
            </div>
            <div id="app-duration" class="app-duration"></div>
        </div>
    </div>

    <div id="card-music" class="card">
        <div class="card-header">
            <span><span id="music-dot" class="status-dot"></span><span id="music-header-text">Now Playing</span></span>
            <span id="time-music" class="update-time">等待数据...</span>
        </div>
        <div id="music-main-container" class="status-main">
            <img id="music-cover" class="music-cover" src="" alt="Cover">
            
            <div id="music-text-info" class="music-text-container">
                <div id="music-title" class="music-title">休眠中</div>
                <div id="music-artist" class="music-artist">无播放任务</div>
            </div>
        </div>
    </div>

    <div id="card-keyboard" class="card">
        <div class="card-header">
            <span>Keyboard Presses (6H)</span>
            <span id="time-input" class="update-time">等待数据...</span>
        </div>
        <div id="chart-keyboard" class="chart-container"></div>
    </div>

    <div id="card-mouse" class="card">
        <div class="card-header">
            <span>Mouse Clicks (6H)</span>
            <span id="time-input-mouse" class="update-time">等待数据...</span>
        </div>
        <div id="chart-mouse" class="chart-container"></div>
    </div>

    <div id="card-odometer" class="card full-width">
        <div class="card-header">
            <span>Physical Odometer (Today)</span>
            <span id="time-odo" class="update-time">等待数据...</span>
        </div>
        <div class="odo-gauges-wrapper">
            <div class="odo-gauge-box">
                <div class="odo-label">MOUSE DISTANCE</div>
                <div id="chart-gauge-mouse" class="gauge-container"></div>
            </div>
            <div class="odo-gauge-box">
                <div class="odo-label">SCROLL DISTANCE</div>
                <div id="chart-gauge-scroll" class="gauge-container"></div>
            </div>
        </div>
        <div id="odo-subtext" class="odo-subtext">积累物理位移...</div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
